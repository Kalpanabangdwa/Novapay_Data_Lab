version: 2

models:
  - name: stg_crm__customer_interactions
    columns:
      - name: interaction_id
        tests:
          - unique
          - not_null

      - name: interaction_sk
        tests:
          - not_null

      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_crm__customers')
                field: customer_id