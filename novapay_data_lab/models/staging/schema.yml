version: 2

models:

  - name: stg_txn__payments
    columns:

      - name: payment_id
        tests:
          - unique
          - not_null

      - name: payment_sk
        tests:
          - not_null

      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_crm__customers')
                field: customer_id

      - name: account_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_txn_accounts')
                field: account_id

      - name: merchant_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_txn_merchants')
                field: merchant_id

      - name: payment_status
        tests:
          - accepted_values:
              arguments:
                values: ['completed', 'pending', 'failed', 'reversed']


  - name: stg_crm__customer_interactions
    columns:

      - name: interaction_id
        tests:
          - unique
          - not_null

      - name: interaction_sk
        tests:
          - not_null

      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_crm__customers')
                field: customer_id


  - name: stg_crm__customers
    columns:

      - name: customer_id
        tests:
          - unique
          - not_null


  - name: stg_txn_accounts
    columns:

      - name: account_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_crm__customers')
                field: customer_id


  - name: stg_txn_merchants
    columns:

      - name: merchant_id
        tests:
          - unique
          - not_null


  - name: stg_vendor__credit_scores
    columns:

      - name: customer_id
        tests:
          - not_null


  - name: stg_reference__country_codes
    columns:

      - name: country_code_2
        tests:
          - unique
          - not_null