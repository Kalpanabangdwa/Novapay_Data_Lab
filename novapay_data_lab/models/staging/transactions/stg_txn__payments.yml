version: 2

models:
  - name: stg_txn__payments
    columns:

      - name: payment_id
        tests:
          - unique
          - not_null

      - name: payment_sk
        tests:
          - not_null

      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_crm__customers')
                field: customer_id

      - name: account_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_txn_accounts')
                field: account_id

      - name: merchant_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_txn_merchants')
                field: merchant_id

      - name: payment_status
        tests:
          - accepted_values:
              arguments:
                values: ['completed', 'pending', 'failed', 'reversed']